<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RFID Academic Card Writer · Web UI</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      user-select: none;
    }

    body {
      margin: 0;
      background: #0f1117;
      font-family: 'Segoe UI', 'Courier New', monospace, system-ui;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* main app card — mimics desktop window */
    .app-window {
      max-width: 600px;
      width: 100%;
      background: #1a1d27;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px #2e3350;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }

    /* header */
    .header {
      background: #1a1d27;
      padding: 18px 24px 12px 24px;
      border-bottom: 1px solid #2e3350;
    }

    .header h1 {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #4f8ef7;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .header .sub {
      font-size: 11px;
      color: #7a82a0;
      letter-spacing: 0.5px;
      margin-left: 6px;
    }

    /* scrollable body */
    .body-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 8px 12px;
      background: #0f1117;
      scrollbar-width: thin;
      scrollbar-color: #2e3350 #1a1d27;
    }

    .body-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .body-scroll::-webkit-scrollbar-track {
      background: #1a1d27;
    }
    .body-scroll::-webkit-scrollbar-thumb {
      background: #2e3350;
      border-radius: 8px;
    }

    /* section cards */
    .section-title {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      color: #7a82a0;
      margin: 16px 8px 4px 8px;
      letter-spacing: 1.5px;
    }

    .card-panel {
      background: #21253a;
      border-radius: 14px;
      padding: 18px 18px;
      margin: 0 6px 8px 6px;
      border: 1px solid #2e3350;
      box-shadow: 0 6px 10px rgba(0, 0, 0, 0.3);
    }

    /* connection status */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .conn-dot {
      font-size: 20px;
      line-height: 1;
      width: 20px;
      text-align: center;
      color: #e74c3c;
      transition: color 0.2s;
    }
    .conn-dot.connected {
      color: #2ecc71;
    }

    .conn-text {
      font-size: 14px;
      font-weight: 500;
      color: #7a82a0;
      flex: 1;
    }
    .conn-text.connected {
      color: #2ecc71;
    }

    .port-selector {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;
    }
    .port-label {
      width: 45px;
      color: #7a82a0;
      font-size: 12px;
    }
    select, .fake-select {
      flex: 1;
      background: #161925;
      border: 1px solid #2e3350;
      color: #e8eaf0;
      padding: 10px 12px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    .refresh-btn {
      background: #1a1d27;
      border: 1px solid #2e3350;
      color: #4f8ef7;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .refresh-btn:hover {
      background: #2e3350;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 12px 8px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      font-family: inherit;
    }
    .btn-primary {
      background: #4f8ef7;
      color: white;
      box-shadow: 0 4px 8px rgba(79, 142, 247, 0.2);
    }
    .btn-primary:hover:not(:disabled) {
      background: #2d5cbf;
    }
    .btn-secondary {
      background: #1a1d27;
      color: #7a82a0;
      border: 1px solid #2e3350;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #2e3350;
      color: #e8eaf0;
    }
    .btn-danger {
      background: #3a1a1a;
      color: #e06060;
      border: 1px solid #7a3030;
    }
    .btn-danger:hover:not(:disabled) {
      background: #5a2a2a;
    }
    .btn-warning {
      background: #7a3030;
      color: white;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* form */
    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .input-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .input-field label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      color: #7a82a0;
      letter-spacing: 0.5px;
    }
    .input-field input {
      background: #161925;
      border: 1px solid #2e3350;
      color: #e8eaf0;
      padding: 12px 14px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      outline: none;
      transition: border 0.15s;
    }
    .input-field input:focus {
      border-color: #4f8ef7;
    }
    .input-field input::placeholder {
      color: #5a6080;
      font-size: 12px;
    }
    .hint {
      color: #7a82a0;
      font-size: 10px;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    /* action area */
    .action-hint {
      color: #7a82a0;
      font-size: 11px;
      margin-bottom: 16px;
      text-align: center;
    }
    .two-cols {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .danger-sep {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: bold;
      color: #7a3030;
      margin: 20px 0 8px 0;
    }

    /* status bar */
    .status-bar {
      background: #1a1d27;
      padding: 12px 20px;
      border-top: 1px solid #2e3350;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #7a82a0;
      display: flex;
      align-items: center;
      min-height: 48px;
    }
    .status-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* misc */
    .clear-btn {
      background: transparent;
      border: 1px solid #2e3350;
      color: #7a82a0;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.15s;
      margin-left: auto;
      display: inline-block;
    }
    .clear-btn:hover {
      background: #2e3350;
    }

    .flex-end {
      display: flex;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
<div class="app-window">
  <!-- HEADER -->
  <div class="header">
    <h1>
      <i class="fas fa-id-card" style="color: #4f8ef7;"></i> 
      RFID CARD WRITER
    </h1>
    <div class="sub">Academic Enrollment Tool · Web UI v1.0</div>
  </div>

  <!-- SCROLLABLE BODY -->
  <div class="body-scroll">
    <!-- CONNECTION SECTION -->
    <div class="section-title"><i class="fas fa-plug"></i> CONNECTION</div>
    <div class="card-panel">
      <div class="status-row">
        <span class="conn-dot" id="connDot">●</span>
        <span class="conn-text" id="connLabel">Not connected</span>
      </div>
      <div class="port-selector">
        <span class="port-label">Port</span>
        <select id="portSelect" class="fake-select">
          <option value="">(no ports found)</option>
        </select>
        <div class="refresh-btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="connectBtn">Connect</button>
        <button class="btn btn-secondary" id="disconnectBtn" disabled>Disconnect</button>
      </div>
    </div>

    <!-- STUDENT DATA -->
    <div class="section-title"><i class="fas fa-user-graduate"></i> STUDENT DATA</div>
    <div class="card-panel">
      <div class="form-grid">
        <div class="input-field">
          <label>LAST NAME *</label>
          <input type="text" id="lastName" placeholder="e.g. DELA CRUZ" maxlength="20">
        </div>
        <div class="input-field">
          <label>FIRST NAME *</label>
          <input type="text" id="firstName" placeholder="e.g. JUAN" maxlength="20">
        </div>
        <div class="input-field">
          <label>M.I.</label>
          <input type="text" id="mi" placeholder="e.g. A  (optional)" maxlength="2">
        </div>
        <div class="input-field">
          <label>SUFFIX</label>
          <input type="text" id="suffix" placeholder="e.g. JR III (optional)" maxlength="5">
        </div>
        <div class="input-field">
          <label>STUDENT ID / LRN *</label>
          <input type="text" id="studentId" placeholder="e.g. 2024-0001" maxlength="16">
        </div>
      </div>
      <div class="hint">* required  |  others optional</div>
    </div>

    <!-- CARD OPERATIONS -->
    <div class="section-title"><i class="fas fa-microchip"></i> CARD OPERATIONS</div>
    <div class="card-panel">
      <div class="action-hint" id="scanHint">Place card on reader BEFORE pressing an action button.</div>
      <div class="two-cols">
        <button class="btn btn-primary" id="writeBtn" disabled>
          <i class="fas fa-pen"></i> WRITE TO CARD
        </button>
        <button class="btn btn-secondary" id="readBtn" disabled>
          <i class="fas fa-qrcode"></i> READ CARD
        </button>
      </div>
      <!-- STOP button (hidden by default) -->
      <div id="stopBtnContainer" style="display: none; margin-bottom: 10px;">
        <button class="btn btn-warning" id="stopScanBtn">
          <i class="fas fa-stop"></i> STOP SCANNING
        </button>
      </div>
      <div class="flex-end">
        <button class="clear-btn" id="clearFormBtn">Clear Form</button>
      </div>

      <div class="danger-sep"><i class="fas fa-exclamation-triangle"></i> DANGER ZONE</div>
      <button class="btn btn-danger" id="deleteBtn" disabled>
        <i class="fas fa-trash-alt"></i> DELETE CARD DATA
      </button>
    </div>
    <div style="height: 16px;"></div>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-text" id="statusMsg">Ready. Connect your hardware to begin.</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM elements ----------
    const connDot = document.getElementById('connDot');
    const connLabel = document.getElementById('connLabel');
    const portSelect = document.getElementById('portSelect');
    const refreshBtn = document.getElementById('refreshBtn');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const writeBtn = document.getElementById('writeBtn');
    const readBtn = document.getElementById('readBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const stopBtnContainer = document.getElementById('stopBtnContainer');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const clearFormBtn = document.getElementById('clearFormBtn');
    const statusMsg = document.getElementById('statusMsg');
    const scanHint = document.getElementById('scanHint');

    // Form inputs
    const lastNameInp = document.getElementById('lastName');
    const firstNameInp = document.getElementById('firstName');
    const miInp = document.getElementById('mi');
    const suffixInp = document.getElementById('suffix');
    const studentIdInp = document.getElementById('studentId');

    // ---------- State ----------
    let isConnected = false;
    let currentPort = '';
    let opRunning = false;        // prevent overlapping commands
    let readModeActive = false;
    let readIntervalId = null;
    
    // Simulated ports (mocking serial list)
    const mockPorts = [
      { device: 'COM3', description: 'USB-SERIAL CH340' },
      { device: 'COM5', description: 'Arduino Uno' },
      { device: '/dev/ttyUSB0', description: 'CP2102 USB to UART' },
      { device: '/dev/ttyACM0', description: 'ESP32' }
    ];

    // ---------- Helper: update UI connection state ----------
    function setUIConnected(connected, portName = '') {
      isConnected = connected;
      if (connected) {
        connDot.classList.add('connected');
        connLabel.classList.add('connected');
        connLabel.textContent = `Connected — ${portName}`;
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        writeBtn.disabled = false;
        readBtn.disabled = false;
        deleteBtn.disabled = false;
      } else {
        connDot.classList.remove('connected');
        connLabel.classList.remove('connected');
        connLabel.textContent = 'Not connected';
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        writeBtn.disabled = true;
        readBtn.disabled = true;
        deleteBtn.disabled = true;
        // also exit read mode if active
        if (readModeActive) {
          exitReadMode();
        }
      }
    }

    function setStatus(text, isError = false, isWarning = false, isSuccess = false) {
      statusMsg.textContent = text;
      // color styling via class? We'll just keep simple.
    }

    // Force uppercase on inputs (mimics _force_caps)
    function forceUppercase(e) {
      const input = e.target;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const val = input.value.toUpperCase();
      input.value = val;
      input.setSelectionRange(start, end);
    }

    [lastNameInp, firstNameInp, miInp, suffixInp, studentIdInp].forEach(inp => {
      inp.addEventListener('input', forceUppercase);
    });

    // ---------- Port simulation ----------
    function populatePorts() {
      // Simulate real ports: mix of available and maybe filter
      const values = mockPorts.map(p => `${p.device}  —  ${p.description}`);
      portSelect.innerHTML = '';
      if (values.length) {
        values.forEach(val => {
          const opt = document.createElement('option');
          opt.value = val;
          opt.textContent = val;
          portSelect.appendChild(opt);
        });
        portSelect.value = values[0];
      } else {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '(no ports found)';
        portSelect.appendChild(opt);
      }
      setStatus('Port list refreshed.');
    }

    function getSelectedPort() {
      const val = portSelect.value;
      if (!val || val.includes('no ports')) return null;
      return val.split('  —  ')[0].trim();
    }

    // ---------- Clear form ----------
    function clearForm() {
      lastNameInp.value = '';
      firstNameInp.value = '';
      miInp.value = '';
      suffixInp.value = '';
      studentIdInp.value = '';
      setStatus('Form cleared.');
    }

    // ---------- Validation ----------
    function validateForm() {
      const last = lastNameInp.value.trim();
      const first = firstNameInp.value.trim();
      const sid = studentIdInp.value.trim();
      if (!last) return { valid: false, msg: 'Last Name is required.' };
      if (!first) return { valid: false, msg: 'First Name is required.' };
      if (!sid) return { valid: false, msg: 'Student ID is required.' };
      const mi = miInp.value.trim();
      if (mi && mi.length > 2) return { valid: false, msg: 'Middle Initial should be 1–2 characters.' };
      return { valid: true, msg: '' };
    }

    // ---------- Simulated async bridge (mocking serial_bridge) ----------
    function mockBridgeCommand(action, payload = null) {
      return new Promise((resolve) => {
        setTimeout(() => {
          if (!isConnected) {
            resolve({ ok: false, msg: 'Not connected to hardware.' });
            return;
          }
          // Simulate various responses
          if (action === 'write') {
            // success 90%
            if (Math.random() > 0.15) {
              resolve({ ok: true, msg: 'Card written successfully!' });
            } else {
              resolve({ ok: false, msg: 'FAILED: Write error (simulated)' });
            }
          } else if (action === 'read') {
            if (Math.random() > 0.2) {
              // return fake data
              const fakeData = {
                last: 'DELA CRUZ',
                first: 'JUAN',
                mi: 'A',
                prefix: '',   // prefix not used in form? but we map later
                student_id: '2024-1234'
              };
              resolve({ ok: true, data: fakeData });
            } else {
              resolve({ ok: false, msg: 'CARD_NOT_FOUND' });
            }
          } else if (action === 'delete') {
            if (Math.random() > 0.1) {
              resolve({ ok: true, msg: 'Card data deleted successfully.' });
            } else {
              resolve({ ok: false, msg: 'FAILED: Delete error' });
            }
          } else {
            resolve({ ok: false, msg: 'Unknown command' });
          }
        }, 800); // simulate delay
      });
    }

    // ---------- Exit read mode ----------
    function exitReadMode() {
      readModeActive = false;
      if (readIntervalId) {
        clearTimeout(readIntervalId);
        readIntervalId = null;
      }
      stopBtnContainer.style.display = 'none';
      readBtn.style.display = 'block';
      scanHint.textContent = 'Place card on reader BEFORE pressing an action button.';
      scanHint.style.color = '#7a82a0';
      // re-enable buttons if not op running
      if (!opRunning) {
        setButtonsBusy(false);
      }
    }

    function setButtonsBusy(busy) {
      opRunning = busy;
      const state = busy ? 'disabled' : (isConnected ? 'normal' : 'disabled');
      writeBtn.disabled = busy || !isConnected;
      readBtn.disabled = busy || !isConnected;
      deleteBtn.disabled = busy || !isConnected;
      connectBtn.disabled = busy || isConnected;
      disconnectBtn.disabled = busy || !isConnected;
    }

    // ---------- read loop (simulate continuous) ----------
    async function performSingleRead() {
      if (!readModeActive || !isConnected) return;
      
      setStatus('Scan mode active — waiting for card...', false, true);
      try {
        const result = await mockBridgeCommand('read');
        if (!readModeActive) return; // cancelled during await
        
        if (result.ok && result.data) {
          // Fill form
          const d = result.data;
          lastNameInp.value = d.last || '';
          firstNameInp.value = d.first || '';
          miInp.value = d.mi || '';
          suffixInp.value = '';  // prefix not used
          studentIdInp.value = d.student_id || '';
          
          setStatus(`Card read OK — ${d.last} ${d.first} [${d.student_id}]`, false, false, true);
        } else {
          if (result.msg === 'CARD_NOT_FOUND') {
            setStatus('Scan mode active — waiting for card...', false, true);
          } else {
            setStatus(result.msg, true);
          }
        }
      } catch (e) {
        setStatus('Read error', true);
      }
      
      if (readModeActive) {
        // schedule next read
        readIntervalId = setTimeout(() => performSingleRead(), 1200);
      }
    }

    function startReadMode() {
      if (opRunning || !isConnected) return;
      readModeActive = true;
      opRunning = true;
      setButtonsBusy(true);
      
      readBtn.style.display = 'none';
      stopBtnContainer.style.display = 'block';
      scanHint.innerHTML = '◉  Scan mode active — place any card on reader to read.';
      scanHint.style.color = '#f39c12';
      setStatus('Scan mode active. Place card on reader.', false, true);
      
      performSingleRead();
    }

    // ---------- Event handlers ----------
    async function onConnect() {
      if (opRunning) return;
      const port = getSelectedPort();
      if (!port) {
        setStatus('No port selected.', true);
        return;
      }
      setStatus(`Connecting to ${port}...`, false, true);
      connectBtn.disabled = true;
      
      // simulate connection success (ping)
      await new Promise(r => setTimeout(r, 600));
      // Assume success
      currentPort = port;
      setUIConnected(true, port);
      setStatus(`Connected on ${port}`, false, false, true);
    }

    function onDisconnect() {
      if (readModeActive) exitReadMode();
      setUIConnected(false);
      setStatus('Disconnected.');
    }

    async function onWrite() {
      if (opRunning || !isConnected) return;
      const validation = validateForm();
      if (!validation.valid) {
        setStatus(validation.msg, true);
        return;
      }
      
      opRunning = true;
      setButtonsBusy(true);
      setStatus('Writing to card... Place card on reader now.', false, true);
      
      const result = await mockBridgeCommand('write');
      opRunning = false;
      setButtonsBusy(false);
      if (isConnected) connectBtn.disabled = true;
      
      if (result.ok) {
        setStatus(result.msg, false, false, true);
      } else {
        setStatus(result.msg, true);
      }
    }

    async function onRead() {
      if (opRunning || !isConnected) return;
      // single read (non-continuous)
      opRunning = true;
      setButtonsBusy(true);
      setStatus('Reading card... Place card on reader.', false, true);
      
      const result = await mockBridgeCommand('read');
      opRunning = false;
      setButtonsBusy(false);
      if (isConnected) connectBtn.disabled = true;
      
      if (result.ok && result.data) {
        const d = result.data;
        clearForm(); // clear first
        lastNameInp.value = d.last || '';
        firstNameInp.value = d.first || '';
        miInp.value = d.mi || '';
        suffixInp.value = '';
        studentIdInp.value = d.student_id || '';
        setStatus(`Card read — ${d.last} ${d.first} [${d.student_id}]`, false, false, true);
      } else {
        setStatus(result.msg || 'Read failed', true);
      }
    }

    async function onDelete() {
      if (opRunning || !isConnected) return;
      if (!confirm('⚠️ Delete all data from card? This cannot be undone.')) return;
      
      opRunning = true;
      setButtonsBusy(true);
      setStatus('Deleting card data... Place card on reader now.', false, true);
      
      const result = await mockBridgeCommand('delete');
      opRunning = false;
      setButtonsBusy(false);
      if (isConnected) connectBtn.disabled = true;
      
      if (result.ok) {
        setStatus(result.msg, false, false, true);
      } else {
        setStatus(result.msg, true);
      }
    }

    function onStopScan() {
      exitReadMode();
      setButtonsBusy(false);
      if (isConnected) connectBtn.disabled = true;
      setStatus('Scan mode stopped.');
    }

    // ---------- Initialize and attach listeners ----------
    function init() {
      populatePorts();
      
      refreshBtn.addEventListener('click', () => {
        if (!opRunning) populatePorts();
      });
      
      connectBtn.addEventListener('click', onConnect);
      disconnectBtn.addEventListener('click', onDisconnect);
      writeBtn.addEventListener('click', onWrite);
      
      // Read button triggers continuous read mode (as per original)
      readBtn.addEventListener('click', () => {
        if (!isConnected || opRunning) return;
        startReadMode();
      });
      
      stopScanBtn.addEventListener('click', onStopScan);
      deleteBtn.addEventListener('click', onDelete);
      clearFormBtn.addEventListener('click', clearForm);
      
      // additional: if user disconnects during read mode
    }

    init();
  })();
</script>
